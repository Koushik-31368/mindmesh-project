<!DOCTYPE html>
<html>
<head>
    <title>MindMesh</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <h1>MindMesh</h1>

    <button id="summaryBtn">
        Summarize Page
    </button>

    <input id="questionInput" type="text" placeholder="Ask about this page">

    <button id="askBtn">
        Ask
    </button>

    <div id="result">
        Ready...
    </div>

    <section class="memory-chat">
        <h2>Memory Chat</h2>

        <input
            id="memoryQuestionInput"
            type="text"
            placeholder="What do you want to ask your saved memory?"
        >

        <button id="memoryAskBtn">
            Ask Memory
        </button>

        <div id="memoryResult">
            Memory answer will appear here.
        </div>
    </section>

    <section class="security-section">
        <h2>Security Analysis</h2>

        <button id="securityBtn">
            Analyze Page Safety
        </button>

        <div id="securityResult">
            Security analysis will appear here.
        </div>
    </section>

    <section class="privacy-section">
        <h2>Privacy Intelligence</h2>

        <textarea id="policyInput" placeholder="Paste privacy policy text here (optional)..."></textarea>

        <button id="privacyBtn">
            Analyze Privacy
        </button>

        <div id="privacyResult">
            Privacy analysis will appear here.
        </div>
    <section class="graph-section">
        <h2>Knowledge Graph</h2>

        <div id="graphStats">
            Loading graph statistics...
        </div>

        <textarea id="graphQuestion" placeholder="Ask about connections (e.g. How is OpenAI connected to Kethan?)..."></textarea>

        <button id="graphAskBtn">
            Ask Graph
        </button>

        <div id="graphResult">
            Graph answer will appear here.
        </div>
    </section>

    <script src="popup.js"></script>

</body>
</html>
